name: Python CI Workflow

on:
  push:
    branches: [ "main", "master" ]
  schedule:
    - cron: '0 12 * * 1'
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Code auschecken
      uses: actions/checkout@v4

    - name: Python einrichten
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Abhängigkeiten installieren
      run: |
        python -m pip install --upgrade pip
        pip install ruff bandit pip-audit
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: 1. Syntax-Check
      run: python -m compileall .

    - name: 2. Tests ausführen
      run: python -m unittest test_calculator.py

    - name: 3. Linting (Ruff)
      continue-on-error: true
      run: ruff check .

    - name: 4. Security Check (Bandit)
      continue-on-error: true
      run: bandit -r .

    - name: 5. Dependency Audit (pip-audit)
      continue-on-error: true
      run: pip-audit -r requirements.txt -f json -o audit.json

    - name: 6. Artefakt hochladen
      uses: actions/upload-artifact@v4
      with:
        name: pip-audit-report
        path: audit.json